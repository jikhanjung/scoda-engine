name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag (e.g. v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      release_notes:
        description: "Release notes (optional, supports markdown)"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./core
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python scripts/build.py --clean

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -j ../ScodaDesktop-${{ inputs.version_tag }}-linux.zip ScodaDesktop ScodaMCP
          cd ..

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\ScodaDesktop.exe, dist\ScodaMCP.exe -DestinationPath ScodaDesktop-${{ inputs.version_tag }}-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ScodaDesktop-${{ inputs.version_tag }}-${{ matrix.platform }}
          path: ScodaDesktop-${{ inputs.version_tag }}-${{ matrix.platform }}.zip
          retention-days: 5

  docker:
    runs-on: ubuntu-latest
    outputs:
      bare_version: ${{ steps.version.outputs.bare }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Strip v prefix from version tag
        id: version
        run: echo "bare=${VERSION_TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          VERSION_TAG: ${{ inputs.version_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            honestjung/scoda-server:${{ steps.version.outputs.bare }}
            honestjung/scoda-server:latest

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download desktop artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: ScodaDesktop-*
          path: release-assets

      - name: Prepare release assets
        run: |
          mkdir -p final-assets
          find release-assets -name '*.zip' -exec cp {} final-assets/ \;
          ls -la final-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}-build.${{ github.run_number }}
          name: "SCODA Desktop ${{ inputs.version_tag }}"
          body: |
            ## SCODA Desktop ${{ inputs.version_tag }}

            ${{ inputs.release_notes }}

            ### Artifacts
            - **ScodaDesktop-${{ inputs.version_tag }}-windows.zip** — Windows x64 (ScodaDesktop.exe + ScodaMCP.exe)
            - **ScodaDesktop-${{ inputs.version_tag }}-linux.zip** — Linux x64 (ScodaDesktop + ScodaMCP)
            - **Docker**: `docker pull honestjung/scoda-server:${{ needs.docker.outputs.bare_version }}`

            ---
            Build: `${{ github.run_number }}` | Commit: `${{ github.sha }}`
          prerelease: ${{ inputs.prerelease }}
          files: final-assets/*
