<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCODA Desktop</title>
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css?v={{ cache_bust }}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" id="navbar-brand">
                <i class="bi bi-diagram-3"></i> <span id="navbar-title">SCODA Desktop</span>
                <small id="navbar-subtitle" class="text-white-50" style="font-size: 0.6em; margin-left: 8px;"></small>
            </span>
            <button class="btn btn-outline-light btn-sm" id="hub-refresh-btn"
                    title="Refresh Hub packages" onclick="hubRefresh()">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </nav>
    <!-- Global loading bar -->
    <div class="global-loading-bar" id="global-loading-bar"></div>
    <!-- View Tabs + Global Search -->
    <div class="view-tabs-bar">
        <button class="hamburger-toggle" id="hamburger-toggle" aria-label="Toggle menu">
            <i class="bi bi-list"></i>
        </button>
        <div class="view-tabs" id="view-tabs"></div>
        <div class="global-controls-container" id="global-controls"></div>
        <div class="global-search-container">
            <div class="global-search-wrapper">
                <i class="bi bi-search"></i>
                <input type="text" id="global-search-input"
                       placeholder="Search..." autocomplete="off">
                <kbd class="global-search-shortcut">Ctrl+K</kbd>
            </div>
            <div class="global-search-results" id="global-search-results"></div>
        </div>
    </div>

    <!-- View: Tree (default, existing layout) -->
    <div class="view-container" id="view-tree">
        <div class="container-fluid main-content">
            <div class="row h-100">
                <!-- Left Panel: Tree View -->
                <div class="col-md-4 col-lg-3 tree-panel">
                    <div class="panel-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-folder-tree"></i> Tree</h5>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-secondary" onclick="expandAll()" title="Expand All">
                                <i class="bi bi-chevron-expand"></i>
                            </button>
                            <button class="btn btn-outline-secondary" onclick="collapseAll()" title="Collapse All">
                                <i class="bi bi-chevron-contract"></i>
                            </button>
                        </div>
                    </div>
                    <div class="tree-container" id="tree-container">
                        <div class="loading">Loading...</div>
                    </div>
                </div>

                <!-- Right Panel: Item List -->
                <div class="col-md-8 col-lg-9 list-panel">
                    <div class="panel-header" id="list-header">
                        <h5><i class="bi bi-list-ul"></i> Select an item</h5>
                    </div>
                    <div class="list-container" id="list-container">
                        <div class="empty-state">
                            <i class="bi bi-arrow-left-circle"></i>
                            <p>Select an item from the tree to view details</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- View: Table (for manifest-driven table views) -->
    <div class="view-container" id="view-table" style="display: none;">
        <div class="container-fluid table-view-content">
            <div class="table-view-header" id="table-view-header"></div>
            <div class="table-view-toolbar" id="table-view-toolbar"></div>
            <div class="table-view-body" id="table-view-body">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- View: Chart (ICS Chronostratigraphic Chart) -->
    <div class="view-container" id="view-chart" style="display: none;">
        <div class="container-fluid chart-view-content">
            <div class="chart-view-header" id="chart-view-header"></div>
            <div class="chart-view-body" id="chart-view-body">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <!-- View: Tree Chart (hierarchy radial + rectangular) -->
    <div class="view-container" id="view-tree-chart" style="display: none;">
        <div class="tc-view-content">
            <div class="tc-toolbar" id="tc-toolbar"></div>
            <div class="tc-canvas-wrap" id="tc-canvas-wrap"></div>
            <div class="tc-breadcrumb" id="tc-breadcrumb"></div>
            <div class="tc-tooltip" id="tc-tooltip" style="display:none;"></div>
            <div class="tc-context-menu" id="tc-context-menu" style="display:none;"></div>
        </div>
    </div>

    <!-- View: Side-by-Side Tree Chart -->
    <div class="view-container" id="view-side-by-side" style="display: none;">
        <div class="sbs-view-content">
            <div class="tc-toolbar" id="sbs-toolbar"></div>
            <div class="sbs-panels">
                <div class="sbs-panel" id="sbs-left">
                    <div class="sbs-panel-header" id="sbs-left-header"></div>
                    <div class="tc-canvas-wrap" id="sbs-left-wrap"></div>
                    <div class="tc-breadcrumb" id="sbs-left-breadcrumb"></div>
                    <div class="tc-tooltip" id="sbs-left-tooltip" style="display:none;"></div>
                </div>
                <div class="sbs-panel" id="sbs-right">
                    <div class="sbs-panel-header" id="sbs-right-header"></div>
                    <div class="tc-canvas-wrap" id="sbs-right-wrap"></div>
                    <div class="tc-breadcrumb" id="sbs-right-breadcrumb"></div>
                    <div class="tc-tooltip" id="sbs-right-tooltip" style="display:none;"></div>
                </div>
            </div>
            <div class="tc-context-menu" id="sbs-context-menu" style="display:none;"></div>
        </div>
    </div>

    <!-- View: Compound (sub-tabs within a single tab) -->
    <div class="view-container" id="view-compound" style="display: none;">
        <div class="compound-header">
            <div class="compound-controls" id="compound-controls"></div>
            <ul class="compound-sub-tabs" id="compound-sub-tabs"></ul>
        </div>
        <div class="compound-sub-content" id="compound-sub-content"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title d-flex align-items-center w-100" id="detailModalTitle">Detail</h5>
                    <button type="button" class="btn-close ms-2" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailModalBody">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js?v={{ cache_bust }}"></script>
    <script src="/static/js/tree_chart.js?v={{ cache_bust }}"></script>
</body>
</html>
